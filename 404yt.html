<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gospel Story Channel</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .accent {
      width: 80px;
      height: 4px;
      background: #60a5fa;
      margin: 2rem auto;
      border-radius: 999px;
    }

    p {
      font-size: 1.2rem;
      color: #dbeafe;
      line-height: 1.7;
    }

    .back-link {
      margin-top: 2rem;
      font-size: 1rem;
    }

    .back-link a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.2s ease;
    }

    .back-link a:hover {
      color: #ffffff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>The Gospel Story Channel<br>is Coming Soon!</h1>

    <div class="accent"></div>

    <p>
      A place to discover the grand story of Scripture—from Genesis to Revelation.
      Stay tuned as we prepare to launch.
    </p>

    <div class="back-link">
      <p>
        In the meantime, continue exploring at<br>
        <a href="https://melvsource.github.io/gospel-story">
          melvsource.github.io/gospel-story
        </a>
      </p>
    </div>
  </div>

</body>
</html>
